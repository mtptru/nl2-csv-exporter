name: Build NLCSV.jar

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build
        run: sh build.sh

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: NLCSV
          path: NLCSV.jar

      # On a version tag (e.g. v1.1), publish a GitHub Release with the jar
      # attached so it can be downloaded and run as-is.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NLCSV.jar
